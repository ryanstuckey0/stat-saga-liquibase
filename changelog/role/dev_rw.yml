databaseChangeLog:
  - changeSet:
      id: ROLE_CREATE_dev_rw
      author: ryanstuckey0
      changes:
        - sql:
            dbms: mysql
            sql: CREATE ROLE 'dev_rw';
      rollback:
        - sql:
            dbms: mysql
            sql: DROP ROLE IF EXISTS 'dev_rw';
  - changeSet:
      id: ROLE_GRANT_dev_rw
      author: ryanstuckey0
      changes:
        - sql:
            dbms: mysql
            sql: GRANT SELECT,UPDATE,INSERT,DELETE ON statsaga.* TO 'dev_rw';
