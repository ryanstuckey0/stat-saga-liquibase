databaseChangeLog:
  - changeSet:
      id: ROLE_CREATE_dba
      author: ryanstuckey0
      changes:
        - sql:
            dbms: mysql
            sql: CREATE ROLE 'dba';
      rollback:
        - sql:
            dbms: mysql
            sql: DROP ROLE IF EXISTS 'dba';
  - changeSet:
      id: ROLE_GRANT_dba
      author: ryanstuckey0
      changes:
        - sql:
            dbms: mysql
            sql: GRANT ALL ON *.* TO 'dba' WITH GRANT OPTION;
        
